<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; width: 390px; padding: 12px; margin: 0; background-color: #f9f9f9; }
    h3 { margin-top: 0; color: #333; }
    .header-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
    .header-row.disabled input { opacity: 0.5; } /* Visual cue for disabled rows */
    .toggle-chk { width: 18px; height: 18px; cursor: pointer; margin: 0; }
    input[type="text"] { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    button { padding: 6px 10px; cursor: pointer; font-size: 13px; border-radius: 4px; }
    .delete-btn { background-color: #ff4d4d; color: white; border: none; }
    .add-btn { width: 100%; margin-top: 8px; background-color: #e7e7e7; color: #333; border: 1px solid #ccc; font-weight: bold; }
    .add-btn:hover { background-color: #ddd; }
    hr { border: 0; border-top: 1px solid #ddd; margin: 12px 0; }
    .save-btn { width: 100%; padding: 8px; background-color: #007bff; color: white; border: none; font-weight: bold; font-size: 14px; }
    .save-btn:hover { background-color: #0056b3; }
  </style>
</head>
<body>
  <h3>Request Headers</h3>
  <div id="headers-container"></div>
  <button id="add-row-btn" class="add-btn">+ Add Row</button>
  <hr>
  <button id="save-btn" class="save-btn">Save & Apply</button>

  <script src="popup.js"></script>
</body>
</html>
