<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; width: 390px; padding: 12px; margin: 0; background-color: #f9f9f9; }
    h3 { margin-top: 0; color: #333; margin-bottom: 4px; }
    .header-container-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .status-badge { font-size: 11px; color: #28a745; background-color: #e8f5e9; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    .save-status { font-size: 11px; color: #666; font-style: italic; }
    .header-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
    .header-row.disabled input { opacity: 0.5; }
    .toggle-chk { width: 18px; height: 18px; cursor: pointer; margin: 0; }
    input[type="text"] { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    button { padding: 6px 10px; cursor: pointer; font-size: 13px; border-radius: 4px; }
    .delete-btn { background-color: #ff4d4d; color: white; border: none; }
    .add-btn { width: 100%; margin-top: 8px; background-color: #007bff; color: white; border: 1px solid #0069d9; font-weight: bold; }
    .add-btn:hover { background-color: #0069d9; }
  </style>
</head>
<body>
  <h3>Request Headers</h3>
  <div class="header-container-wrapper">
    <div id="status" class="status-badge">Detecting tab...</div>
    <div id="save-status" class="save-status">Ready</div>
  </div>
  
  <div id="headers-container"></div>
  <button id="add-row-btn" class="add-btn">+ Add New Header</button>

  <script src="popup.js"></script>
</body>
</html>
